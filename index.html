<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>경매 대시보드 — THE CALIBRATION</title>
  <meta name="description" content="THE CALIBRATION 경매 물건 실시간 대시보드. GAP 스코어, AI 위험도, 3대 서류 수집 현황을 한눈에 파악합니다." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;500;600;700;800&display=swap"
    rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <style>
    /* ── Reset & Base ── */
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg: #0d1117;
      --surface: #161b22;
      --surface2: #1c2333;
      --border: #30363d;
      --text: #e6edf3;
      --text-sub: #8b949e;
      --blue: #2f81f7;
      --blue-dim: #1a3a5c;
      --green: #3fb950;
      --yellow: #d29922;
      --red: #f85149;
      --purple: #a371f7;
      --orange: #f0883e;
      --radius: 12px;
    }

    html {
      font-size: 14px;
      scroll-behavior: smooth;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Pretendard', -apple-system, sans-serif;
      min-height: 100vh;
    }

    /* ── Scrollbar ── */
    ::-webkit-scrollbar {
      width: 6px;
      height: 6px;
    }

    ::-webkit-scrollbar-track {
      background: var(--surface);
    }

    ::-webkit-scrollbar-thumb {
      background: var(--border);
      border-radius: 3px;
    }

    /* ── Layout ── */
    .app {
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }

    /* ── Header ── */
    header {
      position: sticky;
      top: 0;
      z-index: 100;
      background: rgba(13, 17, 23, .9);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
      padding: 0 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 60px;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      text-decoration: none;
    }

    .logo-icon {
      width: 32px;
      height: 32px;
      border-radius: 8px;
      background: linear-gradient(135deg, #2f81f7, #a371f7);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
    }

    .logo-text {
      font-size: 15px;
      font-weight: 700;
      color: var(--text);
    }

    .logo-sub {
      font-size: 11px;
      color: var(--text-sub);
      font-weight: 400;
    }

    .header-actions {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .btn-refresh {
      background: var(--blue-dim);
      color: var(--blue);
      border: 1px solid var(--blue);
      border-radius: 8px;
      padding: 6px 14px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: all .15s;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .btn-refresh:hover {
      background: var(--blue);
      color: #fff;
    }

    .btn-refresh.loading .icon {
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    .last-updated {
      font-size: 11px;
      color: var(--text-sub);
    }

    /* ── Main ── */
    main {
      flex: 1;
      padding: 24px;
      max-width: 1400px;
      margin: 0 auto;
      width: 100%;
    }

    /* ── Stats Row ── */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
      gap: 12px;
      margin-bottom: 24px;
    }

    .stat-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px 18px;
      position: relative;
      overflow: hidden;
      transition: transform .15s, border-color .15s;
    }

    .stat-card:hover {
      transform: translateY(-2px);
      border-color: var(--blue);
    }

    .stat-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 2px;
      background: var(--accent, var(--blue));
    }

    .stat-value {
      font-size: 28px;
      font-weight: 800;
      line-height: 1;
      margin-bottom: 4px;
    }

    .stat-label {
      font-size: 11px;
      color: var(--text-sub);
      font-weight: 500;
    }

    /* ── Charts Row ── */
    .charts-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      margin-bottom: 24px;
    }

    .chart-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px;
    }

    .chart-title {
      font-size: 13px;
      font-weight: 600;
      margin-bottom: 16px;
      color: var(--text-sub);
      text-transform: uppercase;
      letter-spacing: .5px;
    }

    .chart-wrap {
      position: relative;
      height: 180px;
    }

    /* ── Filter Bar ── */
    .filter-bar {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
      margin-bottom: 16px;
    }

    .filter-group {
      display: flex;
      gap: 6px;
    }

    .filter-btn {
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text-sub);
      border-radius: 20px;
      padding: 5px 14px;
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      transition: all .15s;
      white-space: nowrap;
    }

    .filter-btn:hover,
    .filter-btn.active {
      background: var(--blue-dim);
      border-color: var(--blue);
      color: var(--blue);
    }

    .search-wrap {
      flex: 1;
      min-width: 200px;
      position: relative;
    }

    .search-input {
      width: 100%;
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text);
      border-radius: 8px;
      padding: 7px 12px 7px 32px;
      font-size: 13px;
      outline: none;
      transition: border-color .15s;
    }

    .search-input:focus {
      border-color: var(--blue);
    }

    .search-icon {
      position: absolute;
      left: 10px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-sub);
      font-size: 14px;
    }

    .sort-select {
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text);
      border-radius: 8px;
      padding: 7px 10px;
      font-size: 12px;
      cursor: pointer;
      outline: none;
    }

    /* ── Cards Grid ── */
    .cards-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 14px;
    }

    .item-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 18px;
      transition: transform .15s, border-color .15s, box-shadow .15s;
      cursor: pointer;
      position: relative;
    }

    .item-card:hover {
      transform: translateY(-3px);
      border-color: var(--blue);
      box-shadow: 0 8px 24px rgba(47, 129, 247, .15);
    }

    .item-card.urgent {
      border-left: 3px solid var(--orange);
    }

    .item-card.interested {
      border-top: 2px solid var(--purple);
    }

    .card-top {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 12px;
    }

    .card-title {
      font-size: 15px;
      font-weight: 700;
      line-height: 1.3;
    }

    .card-sub {
      font-size: 11px;
      color: var(--text-sub);
      margin-top: 3px;
    }

    .badge-row {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      margin-bottom: 12px;
    }

    .badge {
      padding: 3px 10px;
      border-radius: 12px;
      font-size: 11px;
      font-weight: 600;
      white-space: nowrap;
    }

    .badge-safe {
      background: #0d2818;
      color: var(--green);
      border: 1px solid #1a4d2b;
    }

    .badge-warn {
      background: #2a1f00;
      color: var(--yellow);
      border: 1px solid #4a3500;
    }

    .badge-danger {
      background: #2a0d0d;
      color: var(--red);
      border: 1px solid #4a1a1a;
    }

    .badge-gap-s {
      background: #1f0d3a;
      color: var(--purple);
      border: 1px solid #3d1a6e;
    }

    .badge-gap-a {
      background: #0d1a2a;
      color: var(--blue);
      border: 1px solid #1a3a5c;
    }

    .badge-gap-b {
      background: #0d2818;
      color: var(--green);
      border: 1px solid #1a4d2b;
    }

    .badge-gap-c {
      background: #2a1f00;
      color: var(--yellow);
      border: 1px solid #4a3500;
    }

    .badge-gap-d {
      background: #2a0d0d;
      color: var(--red);
      border: 1px solid #4a1a1a;
    }

    .price-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-bottom: 12px;
    }

    .price-item label {
      font-size: 10px;
      color: var(--text-sub);
      display: block;
      margin-bottom: 2px;
      font-weight: 500;
    }

    .price-item .val {
      font-size: 14px;
      font-weight: 700;
    }

    .dday-chip {
      padding: 4px 10px;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 800;
      background: var(--surface2);
      color: var(--text);
      white-space: nowrap;
    }

    .dday-urgent {
      background: rgba(240, 136, 62, .15);
      color: var(--orange);
    }

    .dday-today {
      background: rgba(248, 81, 73, .2);
      color: var(--red);
    }

    .pdf-row {
      display: flex;
      gap: 6px;
      margin-bottom: 12px;
    }

    .pdf-chip {
      flex: 1;
      text-align: center;
      padding: 5px 4px;
      border-radius: 6px;
      font-size: 10px;
      font-weight: 600;
      background: var(--surface2);
      border: 1px solid var(--border);
    }

    .pdf-ok {
      background: #0d2818;
      color: var(--green);
      border-color: #1a4d2b;
    }

    .pdf-ng {
      background: #1c1c1c;
      color: var(--text-sub);
    }

    .card-footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding-top: 12px;
      border-top: 1px solid var(--border);
    }

    .case-no {
      font-size: 11px;
      color: var(--text-sub);
      font-family: monospace;
    }

    .card-actions {
      display: flex;
      gap: 8px;
    }

    .btn-sm {
      padding: 5px 10px;
      border-radius: 6px;
      font-size: 11px;
      font-weight: 600;
      border: none;
      cursor: pointer;
      text-decoration: none;
      transition: all .15s;
      display: inline-flex;
      align-items: center;
      gap: 4px;
    }

    .btn-court {
      background: var(--blue-dim);
      color: var(--blue);
    }

    .btn-court:hover {
      background: var(--blue);
      color: #fff;
    }

    .btn-star {
      background: var(--surface2);
      color: var(--text-sub);
      border: 1px solid var(--border);
    }

    .btn-star.starred {
      color: var(--purple);
      border-color: var(--purple);
      background: rgba(163, 113, 247, .1);
    }

    .btn-star:hover {
      color: var(--purple);
    }

    /* ── Empty State ── */
    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: var(--text-sub);
    }

    .empty-state svg {
      opacity: .3;
      margin-bottom: 16px;
    }

    /* ── Loading ── */
    .skeleton {
      background: linear-gradient(90deg, var(--surface2) 25%, var(--border) 50%, var(--surface2) 75%);
      background-size: 200% 100%;
      animation: shimmer 1.4s infinite;
      border-radius: 6px;
    }

    @keyframes shimmer {
      0% {
        background-position: 200% 0;
      }

      100% {
        background-position: -200% 0;
      }
    }

    /* ── Toast ── */
    .toast {
      position: fixed;
      bottom: 24px;
      right: 24px;
      z-index: 999;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 12px 18px;
      font-size: 13px;
      font-weight: 500;
      box-shadow: 0 8px 24px rgba(0, 0, 0, .4);
      transform: translateY(80px);
      opacity: 0;
      transition: all .25s cubic-bezier(.34, 1.56, .64, 1);
      max-width: 320px;
    }

    .toast.show {
      transform: translateY(0);
      opacity: 1;
    }

    /* ── Responsive ── */
    @media (max-width: 768px) {
      main {
        padding: 16px;
      }

      .charts-grid {
        grid-template-columns: 1fr;
      }

      .cards-grid {
        grid-template-columns: 1fr;
      }

      .header-actions .last-updated {
        display: none;
      }
    }

    @media (max-width: 480px) {
      .stats-grid {
        grid-template-columns: repeat(3, 1fr);
      }
    }
  </style>
</head>

<body>
  <div class="app" id="app">

    <!-- Header -->
    <header>
      <a class="logo" href="#" aria-label="경매 대시보드 홈">
        <div class="logo-icon">🏛️</div>
        <div>
          <div class="logo-text">경매 대시보드</div>
          <div class="logo-sub">THE CALIBRATION · V4.1</div>
        </div>
      </a>
      <div class="header-actions">
        <span class="last-updated" id="lastUpdated">—</span>
        <button class="btn-refresh" id="btnRefresh" onclick="loadData()" aria-label="데이터 새로고침">
          <span class="icon">↻</span> 새로고침
        </button>
      </div>
    </header>

    <main>
      <!-- Stats -->
      <div class="stats-grid" id="statsGrid" role="region" aria-label="요약 통계">
        <!-- 스켈레톤 -->
        <div class="stat-card">
          <div class="skeleton" style="height:28px;width:60px;margin-bottom:6px"></div>
          <div class="skeleton" style="height:12px;width:80px"></div>
        </div>
        <div class="stat-card">
          <div class="skeleton" style="height:28px;width:40px;margin-bottom:6px"></div>
          <div class="skeleton" style="height:12px;width:60px"></div>
        </div>
        <div class="stat-card">
          <div class="skeleton" style="height:28px;width:40px;margin-bottom:6px"></div>
          <div class="skeleton" style="height:12px;width:60px"></div>
        </div>
        <div class="stat-card">
          <div class="skeleton" style="height:28px;width:40px;margin-bottom:6px"></div>
          <div class="skeleton" style="height:12px;width:80px"></div>
        </div>
        <div class="stat-card">
          <div class="skeleton" style="height:28px;width:40px;margin-bottom:6px"></div>
          <div class="skeleton" style="height:12px;width:80px"></div>
        </div>
      </div>

      <!-- Charts -->
      <div class="charts-grid" role="region" aria-label="통계 차트">
        <div class="chart-card">
          <div class="chart-title">📊 GAP 스코어 분포</div>
          <div class="chart-wrap"><canvas id="chartGap" aria-label="GAP 스코어 등급별 분포 도넛 차트"></canvas></div>
        </div>
        <div class="chart-card">
          <div class="chart-title">💰 감정가 vs 최저매각가 비교 (Top 8)</div>
          <div class="chart-wrap"><canvas id="chartPrice" aria-label="감정가 대비 최저매각가 막대 차트"></canvas></div>
        </div>
      </div>

      <!-- Filter Bar -->
      <div class="filter-bar" role="search" aria-label="물건 필터">
        <div class="search-wrap">
          <span class="search-icon" aria-hidden="true">🔍</span>
          <input id="searchInput" class="search-input" type="search" placeholder="단지명, 소재지, 사건번호 검색…" aria-label="물건 검색"
            oninput="applyFilters()" />
        </div>
        <div class="filter-group" role="group" aria-label="AI 위험도 필터">
          <button class="filter-btn active" data-filter="risk" data-value="all"
            onclick="setFilter('risk','all',this)">전체</button>
          <button class="filter-btn" data-filter="risk" data-value="안전" onclick="setFilter('risk','안전',this)">🟢
            안전</button>
          <button class="filter-btn" data-filter="risk" data-value="주의" onclick="setFilter('risk','주의',this)">🟡
            주의</button>
          <button class="filter-btn" data-filter="risk" data-value="위험" onclick="setFilter('risk','위험',this)">🔴
            위험</button>
        </div>
        <div class="filter-group" role="group" aria-label="GAP 등급 필터">
          <button class="filter-btn active" data-filter="gap" data-value="all" onclick="setFilter('gap','all',this)">GAP
            전체</button>
          <button class="filter-btn" data-filter="gap" data-value="S" onclick="setFilter('gap','S',this)">S급</button>
          <button class="filter-btn" data-filter="gap" data-value="A" onclick="setFilter('gap','A',this)">A급</button>
          <button class="filter-btn" data-filter="gap" data-value="B" onclick="setFilter('gap','B',this)">B급</button>
        </div>
        <div class="filter-group" role="group" aria-label="기타 필터">
          <button class="filter-btn" data-filter="star" data-value="on" id="btnStar" onclick="toggleStarFilter(this)">⭐
            관심만</button>
          <button class="filter-btn" data-filter="urgent" data-value="on" id="btnUrgent"
            onclick="toggleUrgentFilter(this)">🔥 7일 이내</button>
        </div>
        <select class="sort-select" id="sortSelect" onchange="applyFilters()" aria-label="정렬 기준">
          <option value="bid_date">입찰기일순</option>
          <option value="gap_score">GAP 스코어순</option>
          <option value="price_rate">최저가율순</option>
          <option value="loss_count">유찰횟수순</option>
        </select>
      </div>

      <!-- Count -->
      <div style="font-size:12px;color:var(--text-sub);margin-bottom:12px" id="countLabel">불러오는 중…</div>

      <!-- Cards -->
      <div class="cards-grid" id="cardsGrid" role="list" aria-label="경매 물건 목록"></div>
    </main>

    <!-- Toast -->
    <div class="toast" id="toast" role="status" aria-live="polite"></div>
  </div>

  <script>
    // ─────────────────────────────────────────────────────
    // CONFIG — 클라이언트 설정
    // ✅ 보안: API 토큰은 Cloudflare 서버 환경변수에 보관됩니다.
    //          브라우저는 /api/auction-data 프록시만 호출합니다.
    //
    // Cloudflare 대시보드 → Settings → Environment variables 에서 설정:
    //   NOCODB_TOKEN, NOCODB_BASE, TABLE_ID, PROJECT_ID
    // ─────────────────────────────────────────────────────
    const CONFIG = {
      // 서버리스 프록시 엔드포인트 (토큰 불필요)
      API_ENDPOINT: '/api/auction-data',
      PAGE_SIZE: 100,
    };

    // ─────────────────────────────────────────────────────
    // State
    // ─────────────────────────────────────────────────────
    let allItems = [];
    let starred = new Set(JSON.parse(localStorage.getItem('auction_starred') || '[]'));
    let filters = { risk: 'all', gap: 'all', star: false, urgent: false };
    let charts = {};

    // ─────────────────────────────────────────────────────
    // Fetch
    // ─────────────────────────────────────────────────────
    async function loadData() {
      const btn = document.getElementById('btnRefresh');
      btn.classList.add('loading');
      btn.querySelector('.icon').textContent = '↻';

      try {
        const fields = [
          'Id', 'case_no', 'location', 'complex_name', 'area_m2', 'floor',
          'appraisal_price', 'min_price', 'price_rate', 'loss_count', 'bid_date',
          'ai_risk', 'ai_recommend', 'gap_score', 'gap_score_grade',
          'bid_target', 'bid_confidence', 'real_trade_3m_avg', 'bid_vs_trade_gap_rate',
          'pdf_spec_ok', 'pdf_survey_ok', 'pdf_appraisal_ok', 'pdf_status',
          'is_interested', 'court_url', 'ai_summary'
        ].join(',');

        // ✅ 보안: 토큰 없이 Cloudflare 서버리스 프록시(/api/auction-data)만 호출
        //         실제 NocoDB 호출과 토큰 첨부는 서버(functions/api/auction-data.js)에서 처리
        const params = new URLSearchParams({
          where: '(status,eq,진행중)',
          sort: 'bid_date',
          limit: CONFIG.PAGE_SIZE,
          fields,
        });
        const url = `${CONFIG.API_ENDPOINT}?${params.toString()}`;

        const res = await fetch(url);
        if (!res.ok) throw new Error(`HTTP ${res.status}`);

        const data = await res.json();
        allItems = data.list || [];

        updateStats();
        updateCharts();
        applyFilters();

        const now = new Date(Date.now() + 9 * 3600000);
        document.getElementById('lastUpdated').textContent =
          `${now.toISOString().substring(11, 16)} KST 기준`;

        showToast(`✅ ${allItems.length}건 로드 완료`);
      } catch (e) {
        console.error(e);
        showToast(`❌ 데이터 로드 실패: ${e.message}`, true);
      } finally {
        btn.classList.remove('loading');
        btn.querySelector('.icon').textContent = '↻';
      }
    }

    // ─────────────────────────────────────────────────────
    // Stats
    // ─────────────────────────────────────────────────────
    function updateStats() {
      const total = allItems.length;
      const safe = allItems.filter(i => i.ai_risk === '안전').length;
      const caution = allItems.filter(i => i.ai_risk === '주의').length;
      const danger = allItems.filter(i => i.ai_risk === '위험').length;
      const pdfOk = allItems.filter(i => i.pdf_spec_ok && i.pdf_survey_ok && i.pdf_appraisal_ok).length;
      const starCount = allItems.filter(i => starred.has(String(i.Id))).length;

      document.getElementById('statsGrid').innerHTML = [
        { val: total + '건', label: '진행중 물건', accent: '#2f81f7' },
        { val: safe + '건', label: '🟢 안전', accent: '#3fb950' },
        { val: caution + '건', label: '🟡 주의', accent: '#d29922' },
        { val: danger + '건', label: '🔴 위험', accent: '#f85149' },
        { val: pdfOk + '건', label: '📄 서류 완비', accent: '#a371f7' },
        { val: starCount + '건', label: '⭐ 관심 등록', accent: '#a371f7' },
      ].map(s => `
    <div class="stat-card" style="--accent:${s.accent}">
      <div class="stat-value" style="color:${s.accent}">${s.val}</div>
      <div class="stat-label">${s.label}</div>
    </div>
  `).join('');
    }

    // ─────────────────────────────────────────────────────
    // Charts
    // ─────────────────────────────────────────────────────
    function updateCharts() {
      // GAP 도넛
      const gapCounts = { S: 0, A: 0, B: 0, C: 0, D: 0 };
      allItems.forEach(i => { if (i.gap_score_grade) gapCounts[i.gap_score_grade] = (gapCounts[i.gap_score_grade] || 0) + 1; });

      if (charts.gap) charts.gap.destroy();
      charts.gap = new Chart(document.getElementById('chartGap'), {
        type: 'doughnut',
        data: {
          labels: ['S급', 'A급', 'B급', 'C급', 'D급'],
          datasets: [{
            data: [gapCounts.S, gapCounts.A, gapCounts.B, gapCounts.C, gapCounts.D],
            backgroundColor: ['#7c3aed', '#2563eb', '#16a34a', '#d97706', '#dc2626'],
            borderWidth: 2, borderColor: '#161b22',
          }]
        },
        options: {
          responsive: true, maintainAspectRatio: false,
          plugins: {
            legend: { position: 'right', labels: { color: '#8b949e', boxWidth: 12, padding: 12, font: { size: 11 } } }
          },
          cutout: '68%',
        }
      });

      // Price 막대 (Top 8 by gap_score)
      const top8 = [...allItems]
        .filter(i => i.gap_score !== null && i.gap_score !== undefined)
        .sort((a, b) => (b.gap_score || 0) - (a.gap_score || 0))
        .slice(0, 8);

      const labels = top8.map(i => (i.complex_name || i.case_no || '').substring(0, 6));
      const apprData = top8.map(i => Math.round((i.appraisal_price || 0) / 100000000 * 10) / 10);
      const minData = top8.map(i => Math.round((i.min_price || 0) / 100000000 * 10) / 10);

      if (charts.price) charts.price.destroy();
      charts.price = new Chart(document.getElementById('chartPrice'), {
        type: 'bar',
        data: {
          labels,
          datasets: [
            { label: '감정가(억)', data: apprData, backgroundColor: '#2563eb44', borderColor: '#2563eb', borderWidth: 1, borderRadius: 4 },
            { label: '최저가(억)', data: minData, backgroundColor: '#3fb95044', borderColor: '#3fb950', borderWidth: 1, borderRadius: 4 },
          ]
        },
        options: {
          responsive: true, maintainAspectRatio: false,
          plugins: { legend: { labels: { color: '#8b949e', font: { size: 11 } } } },
          scales: {
            x: { ticks: { color: '#8b949e', font: { size: 10 } }, grid: { color: '#30363d' } },
            y: { ticks: { color: '#8b949e', font: { size: 10 }, callback: v => v + '억' }, grid: { color: '#30363d' } },
          }
        }
      });
    }

    // ─────────────────────────────────────────────────────
    // Filters & Sort
    // ─────────────────────────────────────────────────────
    function setFilter(key, val, btn) {
      filters[key] = val;
      document.querySelectorAll(`[data-filter="${key}"]`).forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      applyFilters();
    }

    function toggleStarFilter(btn) {
      filters.star = !filters.star;
      btn.classList.toggle('active', filters.star);
      applyFilters();
    }

    function toggleUrgentFilter(btn) {
      filters.urgent = !filters.urgent;
      btn.classList.toggle('active', filters.urgent);
      applyFilters();
    }

    function applyFilters() {
      const q = document.getElementById('searchInput').value.toLowerCase();
      const sort = document.getElementById('sortSelect').value;
      const today = new Date(); today.setHours(0, 0, 0, 0);

      let result = allItems.filter(item => {
        if (filters.risk !== 'all' && item.ai_risk !== filters.risk) return false;
        if (filters.gap !== 'all' && item.gap_score_grade !== filters.gap) return false;
        if (filters.star && !starred.has(String(item.Id))) return false;
        if (filters.urgent) {
          const bd = new Date(String(item.bid_date || '').split('T')[0]);
          const diff = Math.ceil((bd - today) / 86400000);
          if (diff < 0 || diff > 7) return false;
        }
        if (q) {
          const hay = [item.complex_name, item.location, item.case_no].join(' ').toLowerCase();
          if (!hay.includes(q)) return false;
        }
        return true;
      });

      // Sort
      result.sort((a, b) => {
        if (sort === 'bid_date') return (a.bid_date || '').localeCompare(b.bid_date || '');
        if (sort === 'gap_score') return (b.gap_score || 0) - (a.gap_score || 0);
        if (sort === 'price_rate') return (a.price_rate || 0) - (b.price_rate || 0);
        if (sort === 'loss_count') return (b.loss_count || 0) - (a.loss_count || 0);
        return 0;
      });

      document.getElementById('countLabel').textContent =
        `${result.length}건 / 전체 ${allItems.length}건`;

      renderCards(result);
    }

    // ─────────────────────────────────────────────────────
    // Render Cards
    // ─────────────────────────────────────────────────────
    function renderCards(items) {
      const grid = document.getElementById('cardsGrid');

      if (items.length === 0) {
        grid.innerHTML = `<div class="empty-state" style="grid-column:1/-1">
      <div style="font-size:48px;margin-bottom:12px">🔍</div>
      <div style="font-size:16px;font-weight:600;margin-bottom:8px">해당 물건이 없습니다</div>
      <div style="font-size:13px">필터 조건을 변경해 보세요</div>
    </div>`;
        return;
      }

      const today = new Date(); today.setHours(0, 0, 0, 0);

      grid.innerHTML = items.map(item => {
        const bdStr = String(item.bid_date || '').split('T')[0];
        const bd = new Date(bdStr);
        const diff = bdStr ? Math.ceil((bd - today) / 86400000) : null;
        const isStarred = starred.has(String(item.Id));
        const isUrgent = diff !== null && diff >= 0 && diff <= 7;

        // D-Day display
        let ddayText, ddayClass;
        if (diff === null) { ddayText = '-'; ddayClass = ''; }
        else if (diff < 0) { ddayText = '종료'; ddayClass = ''; }
        else if (diff === 0) { ddayText = '오늘!'; ddayClass = 'dday-today'; }
        else if (diff <= 7) { ddayText = `D-${diff}`; ddayClass = 'dday-urgent'; }
        else { ddayText = `D-${diff}`; ddayClass = ''; }

        // Risk badge
        const riskClass = item.ai_risk === '안전' ? 'badge-safe' : item.ai_risk === '주의' ? 'badge-warn' : 'badge-danger';

        // GAP badge
        const gapClass = `badge-gap-${(item.gap_score_grade || 'd').toLowerCase()}`;

        // Fmt
        const fmt = (n) => {
          if (!n || n <= 0) return '-';
          const e = Math.floor(n / 100000000), m = Math.round((n % 100000000) / 10000);
          return e > 0 ? (m > 0 ? `${e}억 ${m.toLocaleString()}만` : `${e}억`) : `${m.toLocaleString()}만`;
        };

        const gapRateStr = item.bid_vs_trade_gap_rate !== null && item.bid_vs_trade_gap_rate !== undefined
          ? `<span style="color:${item.bid_vs_trade_gap_rate < 0 ? '#3fb950' : '#f85149'};font-size:11px"> ${item.bid_vs_trade_gap_rate < 0 ? '▼' : '▲'}${Math.abs(item.bid_vs_trade_gap_rate)}% 시세대비</span>`
          : '';

        return `
    <article class="item-card${isUrgent ? ' urgent' : ''}${isStarred ? ' interested' : ''}"
             role="listitem" aria-label="${item.complex_name || item.case_no} 물건 카드"
             onclick="openCourt('${item.court_url || ''}','${item.case_no || ''}')">
      <div class="card-top">
        <div>
          <div class="card-title">${item.complex_name || '단지명 미확인'}</div>
          <div class="card-sub">${(item.location || '').substring(0, 25)} | ${item.area_m2 || '-'}㎡ | ${item.floor || '-'}층</div>
        </div>
        <div class="dday-chip ${ddayClass}" style="margin-left:10px;flex-shrink:0">${ddayText}</div>
      </div>

      <div class="badge-row">
        ${item.ai_risk ? `<span class="badge ${riskClass}">${item.ai_risk}</span>` : ''}
        ${item.gap_score_grade ? `<span class="badge ${gapClass}">${item.gap_score_grade}급 ${item.gap_score || ''}점</span>` : ''}
        ${item.loss_count > 0 ? `<span class="badge" style="background:#1c1c1c;color:#8b949e;border:1px solid #30363d">${item.loss_count}회 유찰</span>` : ''}
        ${item.is_interested ? `<span class="badge" style="background:rgba(163,113,247,.1);color:#a371f7;border:1px solid rgba(163,113,247,.3)">⭐ 관심</span>` : ''}
      </div>

      <div class="price-row">
        <div class="price-item">
          <label>감정가</label>
          <div class="val">${fmt(item.appraisal_price)}</div>
        </div>
        <div class="price-item">
          <label>최저매각가 <span style="color:var(--text-sub);font-size:10px">(${item.price_rate || 0}%)</span></label>
          <div class="val" style="color:var(--blue)">${fmt(item.min_price)}</div>
        </div>
      </div>

      ${item.bid_target ? `
      <div style="background:var(--surface2);border-radius:8px;padding:8px 12px;margin-bottom:12px;font-size:12px">
        🎯 추천 입찰가: <strong style="color:var(--green)">${fmt(item.bid_target)}</strong>
        ${gapRateStr}
      </div>` : ''}

      <div class="pdf-row">
        <div class="pdf-chip ${item.pdf_spec_ok ? 'pdf-ok' : 'pdf-ng'}" title="매각물건명세서">
          ${item.pdf_spec_ok ? '✅' : '❌'} 명세서
        </div>
        <div class="pdf-chip ${item.pdf_survey_ok ? 'pdf-ok' : 'pdf-ng'}" title="현황조사서">
          ${item.pdf_survey_ok ? '✅' : '❌'} 현황
        </div>
        <div class="pdf-chip ${item.pdf_appraisal_ok ? 'pdf-ok' : 'pdf-ng'}" title="감정평가서">
          ${item.pdf_appraisal_ok ? '✅' : '❌'} 감정
        </div>
      </div>

      <div class="card-footer">
        <div class="case-no">${item.case_no || '-'}</div>
        <div class="card-actions">
          <button class="btn-sm btn-star ${isStarred ? 'starred' : ''}"
                  id="star-${item.Id}"
                  onclick="event.stopPropagation();toggleStar('${item.Id}')"
                  aria-label="${isStarred ? '관심 해제' : '관심 등록'}"
                  aria-pressed="${isStarred}">
            ${isStarred ? '⭐' : '☆'} ${isStarred ? '관심중' : '관심'}
          </button>
          ${item.court_url ? `
          <a class="btn-sm btn-court" href="${item.court_url}" target="_blank" rel="noopener"
             onclick="event.stopPropagation()"
             aria-label="${item.case_no} 법원경매 상세보기">
            법원 →
          </a>` : ''}
        </div>
      </div>
    </article>`;
      }).join('');
    }

    // ─────────────────────────────────────────────────────
    // Starred (localStorage)
    // ─────────────────────────────────────────────────────
    function toggleStar(id) {
      const sid = String(id);
      if (starred.has(sid)) { starred.delete(sid); showToast('관심 해제됨'); }
      else { starred.add(sid); showToast('⭐ 관심 등록됨'); }
      localStorage.setItem('auction_starred', JSON.stringify([...starred]));
      updateStats();
      applyFilters();
    }

    // ─────────────────────────────────────────────────────
    // Helpers
    // ─────────────────────────────────────────────────────
    function openCourt(url, caseNo) {
      if (url) window.open(url, '_blank', 'noopener');
    }

    let toastTimer;
    function showToast(msg, isError = false) {
      const el = document.getElementById('toast');
      el.textContent = msg;
      el.style.borderColor = isError ? 'var(--red)' : 'var(--border)';
      el.classList.add('show');
      clearTimeout(toastTimer);
      toastTimer = setTimeout(() => el.classList.remove('show'), 3000);
    }

    // ─────────────────────────────────────────────────────
    // Init
    // ─────────────────────────────────────────────────────
    document.addEventListener('DOMContentLoaded', loadData);
  </script>
</body>

</html>
